<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="refresh" content="0; url=http://localhost:8501">
    <title>Opening Leave Management Agent...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Leave Management Agent</h1>
        <p>Opening application in your browser...</p>
        <div class="spinner"></div>
        <p style="font-size: 0.9rem; margin-top: 30px;">
            If browser doesn't open automatically,<br>
            <a href="http://localhost:8501" style="color: #fff; text-decoration: underline;">click here</a>
        </p>
    </div>
    <script>
        // Open in browser automatically
        setTimeout(function() {
            window.location.href = "http://localhost:8501";
        }, 500);
    </script>
</body>
</html>
